/* ─── AI REFLECTION ─── */
async function getReflection(question, answer) {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `You are Eldera — a warm, wise platform connecting experienced older adults with young people who need mentors. A potential mentor has just answered a reflective question during sign-up.

Write a single short response (1–2 sentences, max 45 words) that:
- Responds to what they ACTUALLY wrote — reference something specific from their answer
- Affirms their value as a mentor in a genuine, human way
- Is warm but not saccharine or hollow
- Feels like it came from a thoughtful person, not a bot
- If the answer is gibberish, random letters, or clearly not a real response, gently say something like: "Take your time — whenever you're ready to share, we're here." Don't fabricate warmth for nonsense input.

Never start with "I". Never open with phrases like "What a beautiful answer" or "That's wonderful". Be specific. Be real.`,
        messages: [
          {
            role: "user",
            content: `Question: "${question}"

Their answer: "${answer}"`,
          },
        ],
      }),
    });
    const data = await response.json();
    return data.content?.[0]?.text?.trim() || "Thank you for sharing that with us.";
  } catch {
    return "Thank you for sharing that.";
  }
}

/* ─── UTILITIES ─── */
function FadeIn({ children, delay = 0, duration = 700, style = {} }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), delay); return () => clearTimeout(t); }, [delay]);
  return (
    <div style={{ opacity: visible?1:0, transform: visible?"translateY(0)":"translateY(24px)", transition:`opacity ${duration}ms cubic-bezier(0.2,0.8,0.2,1), transform ${duration}ms cubic-bezier(0.2,0.8,0.2,1)`, ...style }}>
      {children}
    </div>
  );
}

function TypewriterText({ text, speed = 28 }) {
  const [displayed, setDisplayed] = useState("");
  const idx = useRef(0);
  useEffect(() => {
    idx.current = 0; setDisplayed("");
    const interval = setInterval(() => {
      idx.current++;
      setDisplayed(text.slice(0, idx.current));
      if (idx.current >= text.length) clearInterval(interval);
    }, speed);
    return () => clearInterval(interval);
  }, [text]);
  return <span>{displayed}</span>;
}

          <h2 style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.6rem, 3vw, 2.2rem)", color:DARK, lineHeight:1.15, marginBottom:"0.75rem", fontWeight:400, letterSpacing:"-0.02em" }}>This is the same check we&rsquo;d want done if it were <span style={{ color:GOLD, fontStyle:"italic" }}>our child.</span></h2>

        <FadeIn delay={1000}>
          <button onClick={() => { setPhase("processing"); setCheckStep(0); }} style={{ width:"100%", background:GOLD, color:DARK, fontWeight:600, fontSize:"1rem", padding:"1rem", borderRadius:100, border:"none", cursor:"pointer", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }}
            onMouseEnter={(e) => e.target.style.background=GOLD_HOVER} onMouseLeave={(e) => e.target.style.background=GOLD}>
            Submit background check <Arrow />
          </button>
        </FadeIn>
      </div>
    </div>
  );

  if (phase === "processing") {
    const progress = ((checkStep + 1) / STEPS.length) * 100;
    return (
      <div style={{ minHeight:"100vh", background:CLAY, display:"flex", alignItems:"center", justifyContent:"center", padding:"3rem 1.5rem" }}>
        <div style={{ maxWidth:440, width:"100%", textAlign:"center" }}>

            <div style={{ position:"relative", width:100, height:100, margin:"0 auto 2.5rem" }}>

              <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, animation:"orbit 3s linear infinite" }}><div style={{ width:8, height:8, borderRadius:"50%", background:GOLD, position:"absolute", top:-4, left:"50%", marginLeft:-4 }} /></div>
            </div>
            <p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"1.3rem", color:DARK, marginBottom:"0.5rem", fontWeight:400 }}>Verifying your information</p>
            <p key={checkStep} style={{ fontSize:"0.88rem", color:MUTED, marginBottom:"2.5rem", opacity:0, animation:"stepFade 1.6s ease forwards" }}>{STEPS[checkStep]}</p>
            <div style={{ width:"100%", maxWidth:280, margin:"0 auto", height:3, background:BORDER, borderRadius:2, overflow:"hidden" }}>
              <div style={{ height:"100%", background:GOLD, borderRadius:2, width:`${progress}%`, transition:"width 1.5s cubic-bezier(0.4,0,0.2,1)" }} />
            </div>
            <p style={{ fontSize:"0.75rem", color:"rgba(26,21,16,0.25)", marginTop:"1.25rem" }}>Encrypted &middot; Confidential &middot; FCRA compliant</p>
          </FadeIn>
          <style>{`@keyframes shieldPulse{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.12);opacity:0.8}}@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes stepFade{0%{opacity:0;transform:translateY(6px)}15%{opacity:1;transform:translateY(0)}85%{opacity:1}100%{opacity:0.6}}`}</style>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:CLAY, display:"flex", alignItems:"center", justifyContent:"center", padding:"3rem 1.5rem" }}>
      <div style={{ maxWidth:540, textAlign:"center" }}>
        <FadeIn delay={300}><SuccessIcon size={80} /></FadeIn>
        <FadeIn delay={700}><h1 style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.8rem, 3.5vw, 2.6rem)", color:DARK, lineHeight:1.15, marginBottom:"0.75rem", fontWeight:400, letterSpacing:"-0.02em" }}>Check submitted.</h1></FadeIn>
        <FadeIn delay={1100}><p style={{ fontSize:"1rem", color:MUTED, lineHeight:1.7, maxWidth:420, margin:"0 auto" }}>Most results come back within 24&ndash;48 hours. We&rsquo;ll email you the moment you&rsquo;re cleared.</p></FadeIn>
        <FadeIn delay={1500}>
          <div style={{ background:WHITE, border:`1px solid ${GOLD_BORDER}`, borderRadius:20, padding:"2rem 2.25rem", textAlign:"left", maxWidth:460, margin:"2.5rem auto", display:"flex", gap:"1.25rem", alignItems:"flex-start" }}>
            <BookIcon size={48} />

          </div>

        <FadeIn delay={2000}>
          <button onClick={onNext} style={{ background:GOLD, color:DARK, fontWeight:600, fontSize:"1rem", padding:"1rem 2.5rem", borderRadius:100, border:"none", cursor:"pointer", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }}
            onMouseEnter={(e) => { e.target.style.background=GOLD_HOVER; e.target.style.transform="translateY(-2px)"; }}
            onMouseLeave={(e) => { e.target.style.background=GOLD; e.target.style.transform="translateY(0)"; }}>
            Go to my dashboard <Arrow />

        </FadeIn>
      </div>
    </div>
  );
}

/* ─── SCREEN 5: WISDOM PORTRAIT — white bg ─── */
function PortraitScreen({ onDashboard }) {
  const [phase, setPhase] = useState("hub");
  const [chapterIdx, setChapterIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [inputVal, setInputVal] = useState("");
  const [portraitAnswers, setPortraitAnswers] = useState({});
  const [completedChapters, setCompletedChapters] = useState([]);
  const textareaRef = useRef(null);
  const totalQ = PORTRAIT_CHAPTERS.reduce((s,c) => s+c.questions.length, 0);
  const progressPct = Math.round((Object.keys(portraitAnswers).length / totalQ) * 100);

  useEffect(() => { if (phase==="question" && textareaRef.current) setTimeout(() => textareaRef.current?.focus(), 400); }, [phase, qIdx]);

  const handleAnswer = () => {
    if (!inputVal.trim()) return;
    setPortraitAnswers(prev => ({ ...prev, [`${chapterIdx}-${qIdx}`]: inputVal.trim() }));
    const chapter = PORTRAIT_CHAPTERS[chapterIdx];
    if (qIdx < chapter.questions.length - 1) { setQIdx(qIdx+1); setInputVal(""); }
    else { setCompletedChapters(prev => [...prev, chapterIdx]); setPhase(chapterIdx < PORTRAIT_CHAPTERS.length-1 ? "chapterComplete" : "portraitComplete"); setInputVal(""); }
  };

  const startChapter = (idx) => { setChapterIdx(idx); setQIdx(0); setInputVal(""); setPhase("question"); };

  if (phase === "hub") return (
    <div style={{ minHeight:"100vh", background:WHITE, display:"flex", alignItems:"center", justifyContent:"center", padding:"3rem 1.5rem" }}>
      <div style={{ maxWidth:520, width:"100%" }}>
        <FadeIn delay={200}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"2.5rem" }}>
            <div><p style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase", color:GOLD, marginBottom:"0.75rem" }}>Your wisdom portrait</p><h2 style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.6rem, 3vw, 2.2rem)", color:DARK, lineHeight:1.15, fontWeight:400, letterSpacing:"-0.02em" }}>Four chapters. <span style={{ fontStyle:"italic", color:GOLD }}>Your story.</span></h2></div>
            <div style={{ textAlign:"right", flexShrink:0 }}><p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"1.8rem", color:GOLD, fontWeight:500 }}>{progressPct}%</p><p style={{ fontSize:"0.72rem", color:MUTED }}>complete</p></div>
          </div>
        </FadeIn>
        <FadeIn delay={300}><div style={{ width:"100%", height:3, background:BORDER, borderRadius:2, marginBottom:"2.5rem", overflow:"hidden" }}><div style={{ height:"100%", background:GOLD, borderRadius:2, width:`${progressPct}%`, transition:"width 0.6s ease" }} /></div></FadeIn>
        <div style={{ display:"flex", flexDirection:"column", gap:"0.75rem" }}>
          {PORTRAIT_CHAPTERS.map((ch, i) => {
            const isCompleted = completedChapters.includes(i);
            const isAvailable = i===0 || completedChapters.includes(i-1);
            const isInProgress = !isCompleted && Object.keys(portraitAnswers).some(k => k.startsWith(`${i}-`));
            return (
              <FadeIn delay={400+i*100} key={i}>
                <button onClick={() => isAvailable && !isCompleted ? startChapter(i) : null}
                  style={{ width:"100%", textAlign:"left", background:isCompleted?GOLD_PALE:CLAY, border:`1px solid ${isCompleted?GOLD_BORDER:BORDER}`, borderRadius:16, padding:"1.25rem 1.5rem", cursor:isAvailable&&!isCompleted?"pointer":"default", transition:"all 0.2s", opacity:isAvailable||isCompleted?1:0.4, display:"flex", alignItems:"center", gap:"1.25rem" }}
                  onMouseEnter={(e) => { if(isAvailable&&!isCompleted){e.currentTarget.style.borderColor=GOLD_BORDER;e.currentTarget.style.background=GOLD_PALE;} }}
                  onMouseLeave={(e) => { if(isAvailable&&!isCompleted){e.currentTarget.style.borderColor=BORDER;e.currentTarget.style.background=CLAY;} }}>
                  <span style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"2rem", fontWeight:400, lineHeight:1, color:isCompleted?GOLD:DARK, flexShrink:0, width:36, textAlign:"center", letterSpacing:"-0.02em", opacity:isAvailable||isCompleted?1:0.4 }}>{i+1}</span>
                  <div style={{ flex:1 }}>
                    <p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"1.05rem", color:isCompleted?GOLD:DARK, fontWeight:500, marginBottom:"0.2rem" }}>{ch.title}</p>
                    <p style={{ fontSize:"0.78rem", color:MUTED }}>{isCompleted?"Complete":isInProgress?"In progress":ch.subtitle}</p>
                  </div>
                  {isAvailable&&!isCompleted&&<span style={{ color:GOLD, fontSize:"1.1rem" }}>→</span>}
                  {isCompleted&&<div style={{ width:24, height:24, borderRadius:"50%", background:GOLD, display:"flex", alignItems:"center", justifyContent:"center" }}><span style={{ color:DARK, fontSize:"0.7rem", fontWeight:700 }}>✓</span></div>}
                </button>
              </FadeIn>
            );
          })}
        </div>
        <FadeIn delay={900}>
          <div style={{ textAlign:"center", marginTop:"2.5rem", paddingTop:"1.5rem", borderTop:`1px solid ${BORDER}` }}>
            <button onClick={() => onDashboard(progressPct)} style={{ background:"none", border:`1px solid ${BORDER}`, color:MUTED, fontSize:"0.85rem", padding:"0.65rem 1.5rem", borderRadius:100, cursor:"pointer", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }}
              onMouseEnter={(e) => { e.target.style.borderColor=GOLD_BORDER; e.target.style.color=DARK; }}
              onMouseLeave={(e) => { e.target.style.borderColor=BORDER; e.target.style.color=MUTED; }}>
              I'll finish later — take me to my dashboard
            </button>
            <p style={{ fontSize:"0.72rem", color:"rgba(26,21,16,0.25)", marginTop:"0.75rem" }}>Your Portrait saves automatically. Come back any time.</p>
          </div>
        </FadeIn>
      </div>
    </div>
  );

  if (phase === "question") {
    const chapter = PORTRAIT_CHAPTERS[chapterIdx];
    const question = chapter.questions[qIdx];
    return (
      <div style={{ minHeight:"100vh", background:WHITE, display:"flex", alignItems:"center", justifyContent:"center", padding:"3rem 1.5rem" }}>
        <div style={{ maxWidth:600, width:"100%" }}>
          <FadeIn delay={100}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"2rem" }}>
              <div><p style={{ fontSize:"0.68rem", fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase", color:GOLD, opacity:0.8 }}>Chapter {chapterIdx+1} of 4</p><p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"1.05rem", color:DARK, fontWeight:500, marginTop:"0.25rem" }}>{chapter.title}</p></div>
              <button onClick={() => setPhase("hub")} style={{ background:"none", border:"none", color:MUTED, fontSize:"0.78rem", cursor:"pointer", padding:"0.4rem 0", transition:"color 0.2s" }} onMouseEnter={(e) => e.target.style.color=DARK} onMouseLeave={(e) => e.target.style.color=MUTED}>Save &amp; exit <Arrow /></button>
            </div>
            <div style={{ display:"flex", gap:6, marginBottom:"2.5rem" }}>
              {chapter.questions.map((_, qi) => <div key={qi} style={{ flex:1, height:3, borderRadius:2, background:qi<=qIdx?GOLD:BORDER, transition:"background 0.4s" }} />)}
            </div>
          </FadeIn>
          <FadeIn delay={250} key={`pq-${chapterIdx}-${qIdx}`}>
            <p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.3rem, 2.5vw, 1.65rem)", color:DARK, lineHeight:1.4, marginBottom:question.hint?"0.75rem":"2rem", fontWeight:400, letterSpacing:"-0.01em" }}>{question.q}</p>
            {question.hint && <p style={{ fontSize:"0.85rem", color:"rgba(26,21,16,0.38)", marginBottom:"2rem", lineHeight:1.6 }}>{question.hint}</p>}
          </FadeIn>
          <FadeIn delay={400} key={`pi-${chapterIdx}-${qIdx}`}>
            <textarea ref={textareaRef} value={inputVal} onChange={(e) => setInputVal(e.target.value)}
              onKeyDown={(e) => { if(e.key==="Enter"&&!e.shiftKey&&inputVal.trim()){e.preventDefault();handleAnswer();} }}
              placeholder="Start typing..." rows={4}
              style={{ width:"100%", background:CLAY, border:`1px solid ${BORDER}`, borderRadius:16, padding:"1.25rem 1.5rem", fontSize:"1rem", color:DARK, fontFamily:"'Inter', system-ui, sans-serif", lineHeight:1.7, resize:"none", outline:"none", transition:"border-color 0.2s, box-shadow 0.2s" }}
              onFocus={(e) => { e.target.style.borderColor=GOLD; e.target.style.boxShadow=`0 0 0 3px ${GOLD_PALE}`; }}
              onBlur={(e) => { e.target.style.borderColor=BORDER; e.target.style.boxShadow="none"; }} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"1rem" }}>
              <p style={{ fontSize:"0.75rem", color:"rgba(26,21,16,0.25)" }}>Question {qIdx+1} of {chapter.questions.length}</p>
              <button onClick={handleAnswer} disabled={!inputVal.trim()}
                style={{ background:inputVal.trim()?GOLD:BORDER, color:inputVal.trim()?DARK:MUTED, fontWeight:600, fontSize:"0.9rem", padding:"0.7rem 1.75rem", borderRadius:100, border:"none", cursor:inputVal.trim()?"pointer":"default", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }}>
                {qIdx<chapter.questions.length-1?"Continue":"Finish chapter"}
              </button>
            </div>
          </FadeIn>
        </div>
      </div>
    );
  }

  if (phase === "chapterComplete") {
    const chapter = PORTRAIT_CHAPTERS[chapterIdx];
    const newPct = Math.round((Object.keys(portraitAnswers).length / totalQ) * 100);
    return (
      <div style={{ minHeight:"100vh", background:WHITE, display:"flex", alignItems:"center", justifyContent:"center", padding:"3rem 1.5rem" }}>
        <div style={{ maxWidth:500, textAlign:"center" }}>
          <FadeIn delay={200}><p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"4.5rem", fontWeight:400, color:GOLD, lineHeight:1, marginBottom:"1.5rem", letterSpacing:"-0.03em" }}>{chapterIdx+1}</p></FadeIn>
          <FadeIn delay={500}><p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.3rem, 2.5vw, 1.6rem)", color:DARK, lineHeight:1.35, marginBottom:"1rem", fontWeight:400, fontStyle:"italic" }}>{chapter.completion}</p></FadeIn>
          <FadeIn delay={900}><div style={{ display:"inline-flex", background:CLAY, border:`1px solid ${BORDER}`, borderRadius:100, padding:"0.5rem 1.25rem", gap:"0.5rem", alignItems:"center", marginBottom:"2.5rem" }}><span style={{ fontSize:"0.78rem", color:MUTED }}>Portrait</span><span style={{ fontSize:"0.95rem", color:GOLD, fontWeight:600 }}>{newPct}%</span></div></FadeIn>
          <FadeIn delay={1200}>
            <div style={{ display:"flex", gap:"0.75rem", justifyContent:"center", flexWrap:"wrap" }}>
              <button onClick={() => startChapter(chapterIdx+1)} style={{ background:GOLD, color:DARK, fontWeight:600, fontSize:"0.9rem", padding:"0.8rem 2rem", borderRadius:100, border:"none", cursor:"pointer", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }} onMouseEnter={(e) => e.target.style.background=GOLD_HOVER} onMouseLeave={(e) => e.target.style.background=GOLD}>Next chapter <Arrow /></button>
              <button onClick={() => onDashboard(progressPct)} style={{ background:"none", border:`1px solid ${BORDER}`, color:MUTED, fontSize:"0.9rem", padding:"0.8rem 1.5rem", borderRadius:100, cursor:"pointer", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }} onMouseEnter={(e) => { e.target.style.borderColor=GOLD_BORDER; e.target.style.color=DARK; }} onMouseLeave={(e) => { e.target.style.borderColor=BORDER; e.target.style.color=MUTED; }}>Continue later</button>
            </div>
          </FadeIn>
        </div>
      </div>
    );
  }

  if (phase === "portraitComplete") return (
    <div style={{ minHeight:"100vh", background:CLAY, display:"flex", alignItems:"center", justifyContent:"center", padding:"3rem 1.5rem" }}>
      <div style={{ maxWidth:520, textAlign:"center" }}>
        <FadeIn delay={200}><SealIcon size={80} /></FadeIn>
        <FadeIn delay={700}><h1 style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.8rem, 3.5vw, 2.6rem)", color:DARK, lineHeight:1.15, marginBottom:"0.75rem", fontWeight:400, letterSpacing:"-0.02em" }}>Your Portrait is <span style={{ color:GOLD, fontStyle:"italic" }}>complete.</span></h1></FadeIn>
        <FadeIn delay={1100}><p style={{ fontSize:"1rem", color:MUTED, lineHeight:1.7, maxWidth:420, margin:"0 auto 2rem" }}>Every answer you've shared is now part of how we find the child who needs exactly you. This is yours — preserved in the Eldera Repository of Human Wisdom.</p></FadeIn>
        <FadeIn delay={1500}>
          <div style={{ background:WHITE, border:`1px solid ${BORDER}`, borderRadius:20, padding:"1.75rem 2rem", textAlign:"left", maxWidth:440, margin:"0 auto 2.5rem" }}>
            <p style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:GOLD, marginBottom:"0.75rem" }}>What happens next</p>
            {[["Background check clears","We'll email you the moment you're verified."],["We find your match","Your Portrait is now powering the matching engine."],["You meet your person","A personal message. A first name. A story about to begin."]].map(([title,sub],i) => (
              <div key={i} style={{ display:"flex", gap:"1rem", alignItems:"flex-start", marginBottom:i<2?"0.75rem":0 }}>
                <div style={{ width:24, height:24, borderRadius:"50%", background:GOLD_PALE, border:`1px solid ${GOLD_BORDER}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.65rem", color:GOLD, fontWeight:700, flexShrink:0, marginTop:2 }}>{i+1}</div>
                <div><p style={{ fontSize:"0.88rem", color:DARK, fontWeight:500, marginBottom:"0.15rem" }}>{title}</p><p style={{ fontSize:"0.78rem", color:MUTED, lineHeight:1.5 }}>{sub}</p></div>
              </div>
            ))}
          </div>
        </FadeIn>
        <FadeIn delay={1900}>
          <button onClick={() => onDashboard(progressPct)} style={{ background:DARK, color:GOLD, fontWeight:600, fontSize:"1rem", padding:"1rem 2.5rem", borderRadius:100, border:"none", cursor:"pointer", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }}
            onMouseEnter={(e) => { e.target.style.background="#2a2318"; e.target.style.transform="translateY(-2px)"; }}
            onMouseLeave={(e) => { e.target.style.background=DARK; e.target.style.transform="translateY(0)"; }}>
            Go to my dashboard <Arrow />
          </button>
        </FadeIn>
        <FadeIn delay={2200}><p style={{ fontSize:"0.78rem", color:MUTED, marginTop:"1.5rem", fontStyle:"italic", lineHeight:1.6 }}>Not sold. Not trained on. Protected in a Trust.<br />Your voice is already part of something that lasts.</p></FadeIn>
      </div>
    </div>
  );

  return null;
}

function DashboardScreen({ portraitPct, firstName, onPortrait }) {

    { title:"Background Check", sub:"Submitted — typically 24–48 hours", action:"View status", icon:"shield" },
    { title:"Orientation", sub:"Schedule your welcome call", action:"Book a time", icon:"calendar" },

  const iconMap = {

    calendar: <svg viewBox="0 0 24 24" fill="none" style={{ width:20,height:20 }}><rect x="3" y="4" width="18" height="18" rx="2" stroke={GOLD} strokeWidth="1.5"/><path d="M3 9H21" stroke={GOLD} strokeWidth="1.5"/><path d="M8 2V5M16 2V5" stroke={GOLD} strokeWidth="1.5" strokeLinecap="round"/></svg>,
    question: <svg viewBox="0 0 24 24" fill="none" style={{ width:20,height:20 }}><path d="M4 4H20V16C20 17.1 19.1 18 18 18H8L4 22V4Z" stroke={GOLD} strokeWidth="1.5" strokeLinejoin="round"/><path d="M12 8.5C12 7.67 12.67 7 13.5 7C14.33 7 15 7.67 15 8.5C15 9.33 14.33 10 13.5 10H12V12" stroke={GOLD} strokeWidth="1.3" strokeLinecap="round"/><circle cx="12" cy="14" r="0.5" fill={GOLD}/></svg>,
    people: <svg viewBox="0 0 24 24" fill="none" style={{ width:20,height:20 }}><circle cx="9" cy="7" r="3" stroke={GOLD} strokeWidth="1.5"/><circle cx="17" cy="7" r="2.5" stroke={GOLD} strokeWidth="1.3"/><path d="M3 20C3 16.69 5.69 14 9 14C12.31 14 15 16.69 15 20" stroke={GOLD} strokeWidth="1.5" strokeLinecap="round"/><path d="M16 14C18.21 14 20 15.79 20 18" stroke={GOLD} strokeWidth="1.3" strokeLinecap="round"/></svg>,
    profile: <svg viewBox="0 0 24 24" fill="none" style={{ width:20,height:20 }}><circle cx="12" cy="8" r="4" stroke={GOLD} strokeWidth="1.5"/><path d="M5 20C5 16.13 8.13 13 12 13C15.87 13 19 16.13 19 20" stroke={GOLD} strokeWidth="1.5" strokeLinecap="round"/></svg>,
  };
  const PORTRAIT_CHAPTERS_PREVIEW = ["Your Life","What You Know","How You Connect","Who You\u2019re For"];
  return (
    <div style={{ minHeight:"100vh", background:CLAY, padding:"5rem 1.5rem 3rem" }}>
      <div style={{ maxWidth:640, margin:"0 auto" }}>

        {/* Header */}
        <FadeIn delay={200}>
          <h1 style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.6rem, 3vw, 2.2rem)", color:DARK, lineHeight:1.15, marginBottom:"0.5rem", fontWeight:400, letterSpacing:"-0.02em" }}>Welcome home, <span style={{ color:GOLD, fontStyle:"italic" }}>{firstName||"friend"}</span>.</h1>
          <p style={{ fontSize:"0.92rem", color:MUTED, lineHeight:1.7, marginBottom:"2.5rem" }}>You&rsquo;re in. Here&rsquo;s where things stand.</p>
        </FadeIn>

        {/* Journey tracker — updated steps */}
        <FadeIn delay={300}>
          <div style={{ background:DARK, borderRadius:20, padding:"1.75rem 2rem", marginBottom:"1.25rem" }}>
            <p style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:GOLD, marginBottom:"1.25rem" }}>Your journey</p>
            <div style={{ display:"flex", gap:"0.5rem", alignItems:"center" }}>
              {["Joined","BG Check","Portrait","Orientation","Match"].map((step,i) => {
                const done = i < 2;
                const active = i === 1;
                return (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:"0.5rem", flex:i<4?1:"none" }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", flexShrink:0, background:done||active?GOLD:"rgba(255,255,255,0.15)", boxShadow:active?`0 0 0 3px rgba(196,154,42,0.25)`:"none" }} />
                    {i<4&&<div style={{ flex:1, height:1, background:done?GOLD_BORDER:"rgba(255,255,255,0.08)" }} />}
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:"0.6rem" }}>
              {["Joined","BG Check","Portrait","Orientation","Match"].map((label,i) => (
                <span key={i} style={{ fontSize:"0.6rem", color:i<2?SUB_ON_DARK:"rgba(255,255,255,0.25)", textAlign:"center", flex:i<4?1:"none" }}>{label}</span>
              ))}
            </div>
          </div>
        </FadeIn>

        {/* Your why tile */}
        <FadeIn delay={380}>
          <div style={{ background:WHITE, border:`1px solid ${BORDER}`, borderRadius:16, padding:"1.5rem 1.75rem", marginBottom:"0.75rem", cursor:"pointer", transition:"all 0.2s" }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor=GOLD_BORDER; e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.06)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor=BORDER; e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="none"; }}>
            <p style={{ fontSize:"0.68rem", fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:GOLD, marginBottom:"0.6rem" }}>A quick question</p>
            <p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"1.05rem", color:DARK, lineHeight:1.5, marginBottom:"0.75rem", fontWeight:400 }}>If you could hear one thing from a child after a year together, what would you want them to say?</p>
            <span style={{ fontSize:"0.82rem", color:GOLD, fontWeight:500 }}>Answer <Arrow /></span>
          </div>
        </FadeIn>

        {/* Portrait hero tile */}
        <FadeIn delay={400}>
          <div
            onClick={() => onPortrait()}
            style={{ background:WHITE, border:`1.5px solid ${GOLD_BORDER}`, borderRadius:20, padding:"2rem 2.25rem", marginBottom:"0.75rem", cursor:"pointer", transition:"all 0.25s" }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor=GOLD; e.currentTarget.style.boxShadow=`0 6px 24px rgba(196,154,42,0.12)`; e.currentTarget.style.transform="translateY(-2px)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor=GOLD_BORDER; e.currentTarget.style.boxShadow="none"; e.currentTarget.style.transform="translateY(0)"; }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"1rem" }}>
              <div>
                <p style={{ fontSize:"0.68rem", fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:GOLD, marginBottom:"0.5rem" }}>{portraitDone?"Complete · Your Wisdom Portrait":"Start here · Your Wisdom Portrait"}</p>
                <h2 style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"clamp(1.25rem, 2.5vw, 1.6rem)", color:DARK, lineHeight:1.2, fontWeight:400, letterSpacing:"-0.01em" }}>
                  {portraitDone ? <>Portrait <span style={{ fontStyle:"italic", color:GOLD }}>complete.</span></> : <>Four chapters. <span style={{ fontStyle:"italic", color:GOLD }}>Your story.</span></>}
                </h2>
              </div>
              <span style={{ background:portraitDone?GOLD_PALE:GOLD, color:portraitDone?GOLD:DARK, fontSize:"0.62rem", fontWeight:700, letterSpacing:"0.06em", padding:"0.25rem 0.75rem", borderRadius:100, textTransform:"uppercase", flexShrink:0, border:portraitDone?`1px solid ${GOLD_BORDER}`:"none" }}>
                {portraitDone?"Done":`${portraitPct}% complete`}
              </span>
            </div>
            <p style={{ fontSize:"0.85rem", color:MUTED, lineHeight:1.65, marginBottom:"1.5rem", maxWidth:460 }}>
              {portraitDone
                ? "Your answers are powering the matching engine. We\u2019ll reach out the moment we find your person."
                : "This is how our matching engine finds the child who needs exactly you. Build it at your own pace \u2014 your progress saves automatically."}
            </p>
            {/* Chapter preview pills */}
            <div style={{ display:"flex", gap:"0.5rem", flexWrap:"wrap", marginBottom:"1.5rem" }}>
              {PORTRAIT_CHAPTERS_PREVIEW.map((ch, i) => {
                const chDone = portraitPct >= ((i+1)/4)*100;
                return (
                  <div key={i} style={{ background:chDone?GOLD_PALE:"rgba(26,21,16,0.04)", border:`1px solid ${chDone?GOLD_BORDER:BORDER}`, borderRadius:8, padding:"0.4rem 0.85rem", display:"flex", alignItems:"center", gap:"0.5rem" }}>
                    {chDone&&<span style={{ fontSize:"0.6rem", color:GOLD, fontWeight:700 }}>✓</span>}
                    <p style={{ fontSize:"0.72rem", color:chDone?GOLD:"rgba(26,21,16,0.3)", fontWeight:500 }}>{ch}</p>
                  </div>
                );
              })}
            </div>
            <span style={{ fontSize:"0.85rem", color:GOLD, fontWeight:600 }}>
              {portraitDone?"View your Portrait":"Begin Chapter 1"} <Arrow />
            </span>
          </div>
        </FadeIn>

        {/* Secondary tiles grid */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:"0.75rem" }}>
          {secondaryTiles.map((tile,i) => (
            <FadeIn delay={500+i*80} key={i}>
              <div style={{ background:WHITE, border:`1px solid ${tile.highlight?GOLD_BORDER:BORDER}`, borderRadius:16, padding:"1.5rem 1.75rem", cursor:"pointer", transition:"all 0.2s" }}
                onMouseEnter={(e) => { e.currentTarget.style.borderColor=GOLD_BORDER; e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.06)"; }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor=tile.highlight?GOLD_BORDER:BORDER; e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="none"; }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"0.75rem" }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:GOLD_PALE, display:"flex", alignItems:"center", justifyContent:"center" }}>{iconMap[tile.icon]}</div>
                  {tile.highlight&&<span style={{ background:GOLD, color:DARK, fontSize:"0.6rem", fontWeight:700, letterSpacing:"0.06em", padding:"0.2rem 0.6rem", borderRadius:100, textTransform:"uppercase" }}>New</span>}
                </div>
                <p style={{ fontSize:"0.95rem", color:DARK, fontWeight:500, marginBottom:"0.25rem" }}>{tile.title}</p>
                <p style={{ fontSize:"0.78rem", color:MUTED, lineHeight:1.5, marginBottom:"0.75rem" }}>{tile.sub}</p>
                <span style={{ fontSize:"0.78rem", color:GOLD, fontWeight:500 }}>{tile.action} <Arrow /></span>
              </div>
            </FadeIn>
          ))}
        </div>

        {/* Invite banner */}
        <FadeIn delay={950}>
          <div style={{ background:DARK, borderRadius:20, padding:"2rem 2.25rem", marginTop:"1.5rem", display:"flex", alignItems:"center", gap:"1.5rem" }}>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:"0.5rem", marginBottom:"0.75rem" }}><ElderaIconAnimated color={GOLD} size={18} /><p style={{ fontSize:"0.72rem", fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:GOLD }}>Invite</p></div>
              <p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"1.15rem", color:WHITE, fontWeight:500, lineHeight:1.3, marginBottom:"0.5rem" }}>Invite a friend. Double the impact.</p>
              <p style={{ fontSize:"0.82rem", color:SUB_ON_DARK, lineHeight:1.6, marginBottom:"1.25rem" }}>Share Eldera with someone whose kindness and life experience could inspire a young person.</p>
              <button style={{ background:GOLD, color:DARK, fontWeight:600, fontSize:"0.85rem", padding:"0.6rem 1.5rem", borderRadius:100, border:"none", cursor:"pointer", transition:"all 0.2s", fontFamily:"'Inter', system-ui, sans-serif" }} onMouseEnter={(e) => e.target.style.background=GOLD_HOVER} onMouseLeave={(e) => e.target.style.background=GOLD}>Share your invite link <Arrow /></button>
            </div>
            <div style={{ width:80, height:80, borderRadius:"50%", background:"rgba(196,154,42,0.08)", border:`1px solid ${GOLD_BORDER}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <svg viewBox="0 0 24 24" fill="none" style={{ width:28, height:28 }}><circle cx="9" cy="7" r="3" stroke={GOLD} strokeWidth="1.5"/><path d="M3 20C3 16.69 5.69 14 9 14C12.31 14 15 16.69 15 20" stroke={GOLD} strokeWidth="1.5" strokeLinecap="round"/><path d="M18 8V14M15 11H21" stroke={GOLD} strokeWidth="1.5" strokeLinecap="round"/></svg>
            </div>

        <FadeIn delay={1000}><div style={{ textAlign:"center", marginTop:"2.5rem", padding:"1.5rem", borderTop:`1px solid ${BORDER}` }}><p style={{ fontFamily:"'Newsreader', Georgia, serif", fontSize:"0.88rem", color:MUTED, fontStyle:"italic", lineHeight:1.6 }}>Everything you contribute here is being preserved in the Eldera Repository of Human Wisdom.<br />Not sold. Not trained on. Protected in a Trust.</p></div></FadeIn>
      </div>

}

/* ─── MAIN ─── */
function MentorSignupFlow() {
  const [screen, setScreen] = useState("entry");
  const [answers, setAnswers] = useState(["","",""]);
  const [userName, setUserName] = useState("");
  const [portraitPct, setPortraitPct] = useState(0);
  const onLight = ["entry","claim","bgcheck","portrait"].includes(screen);
  const isDark = false;
  return (
    <div style={{ fontFamily:"'Inter', system-ui, sans-serif", WebkitFontSmoothing:"antialiased" }}>
      <style>{`button:hover [data-arrow], a:hover [data-arrow] { transform: translateX(4px) !important; }`}</style>
      <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
      {(() => {
        const prevScreen = { entry: null, claim: "entry", bgcheck: "claim", portrait: "dashboard" }[screen];
        const showBack = ["entry","claim","bgcheck","portrait"].includes(screen);
        const navColor = isDark ? WHITE : DARK;
        const navBorderColor = isDark ? "rgba(255,255,255,0.15)" : "rgba(26,21,16,0.15)";
        const navBorderHover = isDark ? "rgba(255,255,255,0.3)" : "rgba(26,21,16,0.3)";
        return (
          <div style={{ position:"fixed", top:0, left:0, right:0, zIndex:100, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"1.25rem 3rem" }}>
            <a href="index.html" style={{ textDecoration:"none", display:"flex", alignItems:"center" }}>
              <ElderaWordmark color={onLight?DARK:WHITE} height={32} />
            </a>
            {showBack && (
              <button
                onClick={() => prevScreen ? setScreen(prevScreen) : (window.location.href = "mentors.html")}
                style={{ background:"none", border:`1px solid ${navBorderColor}`, borderRadius:100, padding:"0.45rem 1.1rem", fontSize:"0.78rem", fontWeight:500, color:navColor, cursor:"pointer", fontFamily:"'Inter', system-ui, sans-serif", display:"flex", alignItems:"center", gap:"0.4rem", transition:"all 0.2s", opacity:0.75 }}
                onMouseEnter={(e) => { e.currentTarget.style.opacity="1"; e.currentTarget.style.borderColor=navBorderHover; }}
                onMouseLeave={(e) => { e.currentTarget.style.opacity="0.75"; e.currentTarget.style.borderColor=navBorderColor; }}>
                ← Back
              </button>
            )}
          </div>
        );
      })()}
      {screen==="entry"&&<EntryScreen onNext={() => setScreen("claim")} />}
      {screen==="claim"&&<IdentityClaimScreen onNext={(name) => { setUserName(name); setScreen("bgcheck"); }} />}
      {screen==="bgcheck"&&<BackgroundCheckScreen onNext={() => setScreen("dashboard")} userName={userName} />}
      {screen==="portrait"&&<PortraitScreen onDashboard={(pct) => { setPortraitPct(pct); setScreen("dashboard"); }} />}
      {screen==="dashboard"&&<DashboardScreen portraitPct={portraitPct} firstName={userName} onPortrait={() => setScreen("portrait")} />}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MentorSignupFlow />);
  </script>
</body>
